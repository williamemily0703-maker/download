import os

html_content = """
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Handwriting Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=EB+Garamond&family=Montserrat:wght@300;400;600&family=Playfair+Display&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            color: var(--text);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 25px;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 0.9em;
        }
        input[type="password"], input[type="file"], select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            font-size: 1em;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        
        #preview-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px dashed var(--border);
            display: none;
        }
        #output-text {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.6;
        }
        .status {
            font-size: 0.9em;
            font-weight: 600;
            text-align: center;
        }
        .status.error { color: #ef4444; }
        .status.success { color: #10b981; }
        .status.loading { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Handwriting Scanner</h1>
        <p>Bóc tách chữ viết tay trên giấy kẻ ô ly bằng AI Vision</p>
    </header>

    <div class="main-grid">
        <div class="card">
            <div class="input-group">
                <label for="apiKey">Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Nhập API Key của bạn...">
            </div>
            
            <div class="input-group">
                <label for="imageInput">Chọn ảnh chữ viết tay</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <img id="preview-img" alt="Preview">

            <button id="scanBtn" class="btn" disabled>Gửi AI Phân Tích</button>
            <div id="status" class="status"></div>
        </div>

        <div class="card">
            <div class="input-group">
                <label for="fontSelect">Định dạng phông chữ</label>
                <select id="fontSelect">
                    <option value="'Montserrat', sans-serif">Phông mặc định (Dễ đọc)</option>
                    <option value="'Playfair Display', serif">Cổ điển (Playfair)</option>
                    <option value="'Dancing Script', cursive">Nghệ thuật (Dancing Script)</option>
                    <option value="'EB Garamond', serif">Trang trọng (Garamond)</option>
                </select>
            </div>
            
            <textarea id="output-text" placeholder="Văn bản AI trích xuất sẽ hiển thị tại đây..."></textarea>
            
            <button id="downloadBtn" class="btn" style="background: #10b981;">Tải xuống file .txt</button>
        </div>
    </div>
</div>

<script>
    const apiKeyInput = document.getElementById('apiKey');
    const imageInput = document.getElementById('imageInput');
    const previewImg = document.getElementById('preview-img');
    const scanBtn = document.getElementById('scanBtn');
    const statusDiv = document.getElementById('status');
    const outputText = document.getElementById('output-text');
    const fontSelect = document.getElementById('fontSelect');
    const downloadBtn = document.getElementById('downloadBtn');

    let base64Image = "";

    // Xử lý khi chọn ảnh
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            previewImg.src = event.target.result;
            previewImg.style.display = 'block';
            
            // Lấy phần dữ liệu base64 (bỏ phần tiền tố data:image/jpeg;base64,)
            base64Image = event.target.result.split(',')[1];
            scanBtn.disabled = false;
        };
        reader.readAsDataURL(file);
    });

    // Gọi API khi nhấn nút
    scanBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            showStatus("Vui lòng nhập API Key trước khi quét.", "error");
            return;
        }

        scanBtn.disabled = true;
        showStatus("AI đang đọc hình ảnh... Vui lòng chờ vài giây.", "loading");

        const promptText = "Hãy trích xuất toàn bộ chữ viết tay trong bức ảnh này sang văn bản text. Hãy đọc kỹ, bỏ qua các đường kẻ ô ly, bóng mờ hoặc nhiễu. Trữ lại đúng định dạng xuống dòng của người viết. Chỉ trả về phần văn bản bạn đọc được, tuyệt đối không thêm bất kỳ lời bình luận hay giải thích nào khác.";

        const requestBody = {
            contents: [{
                parts: [
                    { text: promptText },
                    {
                        inline_data: {
                            mime_type: "image/jpeg",
                            data: base64Image
                        }
                    }
                ]
            }],
            generationConfig: {
                temperature: 0.1 // Giảm tính sáng tạo, ưu tiên tính chính xác
            }
        };

        try {
            // Gọi API Gemini 1.5 Flash (nhanh và xử lý ảnh xuất sắc)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || "Lỗi kết nối API");
            }

            // Trích xuất text từ response của Google
            const extractedText = data.candidates[0].content.parts[0].text;
            outputText.value = extractedText;
            showStatus("Thành công! Đã bóc tách văn bản.", "success");

        } catch (error) {
            showStatus(`Lỗi: ${error.message}`, "error");
        } finally {
            scanBtn.disabled = false;
        }
    });

    // Đổi phông chữ
    fontSelect.addEventListener('change', () => {
        outputText.style.fontFamily = fontSelect.value;
    });

    // Tải file
    downloadBtn.addEventListener('click', () => {
        if (!outputText.value) return;
        const blob = new Blob([outputText.value], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'AI_Scan_Result.txt';
        a.click();
        window.URL.revokeObjectURL(url);
    });

    function showStatus(message, type) {
        statusDiv.innerText = message;
        statusDiv.className = `status ${type}`;
    }
</script>
</body>
</html>
"""

with open("ai_handwriting_scanner.html", "w", encoding="utf-8") as f:
    f.write(html_content)

print("ai_handwriting_scanner.html")
