<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng dụng Scan & Quét chữ viết tay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script&family=Patrick+Hand&family=Roboto&display=swap');

        :root { --primary: #4F46E5; --bg: #F3F4F6; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; gap: 20px; height: 95vh; }
        
        /* Cột bên trái: Quản lý thư mục */
        .sidebar { width: 250px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column;}
        .folder-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .folder-item { padding: 10px; margin-bottom: 5px; background: #e5e7eb; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .folder-item.active { background: var(--primary); color: white; }
        
        /* Cột bên phải: Khu vực làm việc */
        .workspace { flex-grow: 1; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; overflow-y: auto;}
        
        /* Nút bấm và Input */
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #4338ca; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        input[type="text"], select { padding: 10px; border: 1px solid #d1d5db; border-radius: 5px; }
        
        /* Khu vực Canvas & Công cụ */
        .tools-panel { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; background: #f9fafb; padding: 15px; border-radius: 8px;}
        canvas { max-width: 100%; max-height: 400px; border: 2px dashed #d1d5db; border-radius: 5px; display: none; margin: 0 auto;}
        
        /* Khu vực văn bản */
        textarea { width: 100%; height: 200px; padding: 15px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 16px; resize: vertical; box-sizing: border-box;}
        
        .loading { display: none; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>📂 Thư mục tạm nhớ</h3>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="newFolderName" placeholder="Tên thư mục mới..." style="width: 100%;">
            <button onclick="createFolder()">+</button>
        </div>
        <div class="folder-list" id="folderList">
            </div>
        <button onclick="downloadAll()" style="background: #10b981; margin-top: 15px;">⬇️ Tải tất cả về máy (ZIP)</button>
    </div>

    <div class="workspace">
        <h2 id="currentFolderTitle">Đang làm việc tại: [Chưa chọn]</h2>
        
        <div class="tools-panel">
            <input type="file" id="imageInput" accept="image/*" onchange="loadImage(event)">
            
            <div style="flex-grow: 1;">
                <label>Khắc phục nét mờ (Độ tương phản): <span id="contrastValue">0</span></label><br>
                <input type="range" id="contrastSlider" min="-100" max="100" value="0" style="width: 100%;" onchange="applyContrast()">
            </div>
            
            <button id="scanBtn" onclick="scanText()" disabled>🔍 Quét & Chuyển thành chữ</button>
            <span class="loading" id="loadingStatus">Đang đọc chữ... Vui lòng đợi!</span>
        </div>

        <canvas id="imageCanvas"></canvas>

        <div class="tools-panel">
            <label>Chọn Phong Chữ cho kết quả:</label>
            <select id="fontSelector" onchange="changeFont()">
                <option value="Roboto">Mặc định (Roboto)</option>
                <option value="'Dancing Script', cursive">Chữ viết tay nghệ thuật (Dancing Script)</option>
                <option value="'Patrick Hand', cursive">Chữ viết tay tự nhiên (Patrick Hand)</option>
                <option value="Times New Roman">Văn bản chuẩn (Times New Roman)</option>
            </select>
            <button onclick="saveFileToFolder()">💾 Lưu văn bản vào thư mục</button>
        </div>

        <textarea id="resultText" placeholder="Kết quả chữ được máy đọc sẽ hiện ở đây... Bạn có thể chỉnh sửa lại nội dung."></textarea>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // --- HỆ THỐNG LƯU TRỮ TẠM THỜI (MEMORY) ---
        let fileSystem = { "Tai_Lieu_Cua_Toi": [] }; 
        let activeFolder = "Tai_Lieu_Cua_Toi";
        
        // --- BIẾN XỬ LÝ ẢNH ---
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        let originalImageData = null; // Giữ ảnh gốc để chỉnh sửa không bị hỏng

        // 1. Khởi tạo giao diện thư mục
        function renderFolders() {
            const list = document.getElementById('folderList');
            list.innerHTML = '';
            for (let folder in fileSystem) {
                let div = document.createElement('div');
                div.className = 'folder-item ' + (folder === activeFolder ? 'active' : '');
                div.innerText = `📁 ${folder} (${fileSystem[folder].length} file)`;
                div.onclick = () => { activeFolder = folder; renderFolders(); updateTitle(); };
                list.appendChild(div);
            }
            updateTitle();
        }

        function updateTitle() {
            document.getElementById('currentFolderTitle').innerText = `Đang làm việc tại: ${activeFolder}`;
        }

        function createFolder() {
            const name = document.getElementById('newFolderName').value.trim();
            if (name && !fileSystem[name]) {
                fileSystem[name] = [];
                document.getElementById('newFolderName').value = '';
                renderFolders();
            }
        }

        // 2. Tải ảnh lên và vẽ ra Canvas
        function loadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    canvas.style.display = 'block';
                    // Đặt kích thước canvas vừa với ảnh
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    // Lưu lại dữ liệu ảnh gốc để chỉnh độ tương phản
                    originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    document.getElementById('scanBtn').disabled = false;
                    document.getElementById('contrastSlider').value = 0;
                    document.getElementById('contrastValue').innerText = "0";
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // 3. Khắc phục nét mờ bằng cách tăng tương phản (Contrast Filter)
        function applyContrast() {
            if (!originalImageData) return;
            const contrast = parseInt(document.getElementById('contrastSlider').value);
            document.getElementById('contrastValue').innerText = contrast;

            // Thuật toán chỉnh tương phản
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            
            // Tạo một bản sao dữ liệu ảnh để không ghi đè ảnh gốc
            const imageData = new ImageData(
                new Uint8ClampedArray(originalImageData.data),
                originalImageData.width,
                originalImageData.height
            );
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                data[i] = factor * (data[i] - 128) + 128;     // Đỏ
                data[i+1] = factor * (data[i+1] - 128) + 128; // Xanh lá
                data[i+2] = factor * (data[i+2] - 128) + 128; // Xanh dương
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // 4. Quét chữ bằng Tesseract.js
        async function scanText() {
            const loading = document.getElementById('loadingStatus');
            const scanBtn = document.getElementById('scanBtn');
            const resultText = document.getElementById('resultText');
            
            loading.style.display = 'inline';
            scanBtn.disabled = true;
            resultText.value = '';

            try {
                // Lấy ảnh đã được làm nét từ Canvas
                const dataUrl = canvas.toDataURL('image/png');
                
                // Nhận diện Tiếng Việt ('vie')
                const result = await Tesseract.recognize(dataUrl, 'vie', {
                    logger: m => console.log(m) // Xem tiến trình trong console (F12)
                });
                
                resultText.value = result.data.text;
            } catch (error) {
                alert("Có lỗi xảy ra khi đọc chữ. Hãy thử lại!");
                console.error(error);
            } finally {
                loading.style.display = 'none';
                scanBtn.disabled = false;
            }
        }

        // 5. Thay đổi Phong chữ
        function changeFont() {
            const font = document.getElementById('fontSelector').value;
            document.getElementById('resultText').style.fontFamily = font;
        }

        // 6. Lưu file vào bộ nhớ ảo
        function saveFileToFolder() {
            const text = document.getElementById('resultText').value;
            if (!text.trim()) {
                alert("Chưa có nội dung để lưu!");
                return;
            }
            const fileName = "Tai_Lieu_" + new Date().getTime() + ".txt";
            fileSystem[activeFolder].push({ name: fileName, content: text });
            alert(`Đã lưu vào thư mục: ${activeFolder}`);
            renderFolders();
        }

        // 7. Tải tất cả thư mục về máy (Đóng gói thành file ZIP)
        function downloadAll() {
            let zip = new JSZip();
            let hasFiles = false;

            for (let folder in fileSystem) {
                if (fileSystem[folder].length > 0) {
                    let folderZip = zip.folder(folder);
                    fileSystem[folder].forEach(file => {
                        folderZip.file(file.name, file.content);
                        hasFiles = true;
                    });
                }
            }

            if (!hasFiles) {
                alert("Các thư mục hiện đang trống. Hãy lưu tài liệu trước khi tải về!");
                return;
            }

            zip.generateAsync({type:"blob"}).then(function(content) {
                // Tạo một thẻ <a> ẩn để kích hoạt tải file
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "Tai_Lieu_Scan.zip";
                link.click();
            });
        }

        // Khởi chạy ứng dụng
        renderFolders();
    </script>
</body>
</html>
